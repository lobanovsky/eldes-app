services:

  eldes-app:
    image: ${DOCKER_USERNAME}/eldes-app:${TAG}
    container_name: eldes-app
    restart: always

    environment:
      BUILD_NUMBER: ${TAG}
      VITE_BACKEND_URL: ${VITE_BACKEND_URL}
      REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gate.rule=Host(`gate.housekpr.ru`)"
    networks:
      - housekpr-network

networks:
  housekpr-network:
    external: true
